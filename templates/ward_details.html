<!DOCTYPE html>
<html>

<head>

<title>Ward Details</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.card{

background:white;
width:500px;
margin:auto;
margin-top:80px;
padding:30px;
box-shadow:0 0 10px gray;

}

</style>

</head>

<body>

<div class="card">

<h2>{{ ward.ward_name }}</h2>

<p><b>Ward Number:</b> {{ ward.ward_no }}</p>

<p><b>Councillor:</b> {{ ward.councillor }}</p>

<p><b>Facilities:</b> {{ ward.facilities }}</p>

<h3>Population</h3>

<p>2011 : {{ ward.pop_2011 }}</p>
<p>2015 : {{ ward.pop_2015 }}</p>
<p>2020 : {{ ward.pop_2020 }}</p>
<p>2025 : {{ ward.pop_2025 }}</p>

</div>

</body>

</html>
