<!DOCTYPE html>
<html>
<head>

<title>Madurai Smart City Population Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
height:100vh;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(-45deg,#1e3c72,#2a5298,#4facfe,#00f2fe);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
display:flex;
flex-direction:column;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
text-align:center;
color:white;
padding:20px;
}

.header h1{
font-weight:bold;
}

.content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.card-box{
background: rgba(255,255,255,0.95);
padding:40px;
border-radius:20px;
width:380px;
box-shadow:0 10px 35px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="header">

<h1>Madurai Smart City Dashboard</h1>
<h5>Ward Wise Population Density Visualization System</h5>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</body>
</html>
